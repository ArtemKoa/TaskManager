{% extends 'core/base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">Мой профиль</div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <h4>Основная информация</h4>
                        {{ user_form.as_p }}
                        <h4 class="mt-4">Дополнительная информация</h4>
                        {{ profile_form.as_p }}
                        
                        {% if user_profile.avatar %}
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="avatar-clear" id="avatar-clear">
                                <label class="form-check-label" for="avatar-clear">
                                    Удалить текущий аватар
                                </label>
                            </div>
                        </div>
                        {% endif %}
                        
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                        <a href="{% url 'core:home' %}" class="btn btn-secondary">Отмена</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
